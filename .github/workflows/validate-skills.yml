name: Validate Skills

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Validate all skills
        run: |
          # Find all directories containing a SKILL.md file and validate them
          failed_skills=()
          
          # Use process substitution to avoid subshell issues with the array
          while read -r skill_dir; do
            echo "------------------------------------------------------------"
            echo "Validating skill in: $skill_dir"
            if ! $HOME/.local/bin/uvx --from git+https://github.com/agentskills/agentskills#subdirectory=skills-ref skills-ref validate "$skill_dir"; then
              echo "::error file=$skill_dir/SKILL.md::Validation failed for $skill_dir"
              failed_skills+=("$skill_dir")
            fi
          done < <(find . -name "SKILL.md" -type f -exec dirname {} \;)

          echo "------------------------------------------------------------"
          if [ ${#failed_skills[@]} -ne 0 ]; then
            echo "Validation failed for the following skills:"
            for skill in "${failed_skills[@]}"; do
              echo "  - $skill"
            done
            exit 1
          else
            echo "All skills validated successfully!"
          fi
